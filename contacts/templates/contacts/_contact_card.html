<!-- Contact Card Component - Premium SaaS Design -->
<div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-200 dark:border-gray-700 overflow-hidden card-hover transition-all duration-300 h-full">
    <!-- Card Header -->
    <div class="p-6 pb-4 border-b border-gray-100 dark:border-gray-700">
        <div class="flex items-start justify-between mb-3">
            <!-- Avatar + Name -->
            <div class="flex items-center space-x-3 flex-1 min-w-0">
                <div class="w-14 h-14 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-white font-bold text-xl shadow-md">
                    {{ contact.name|first|upper }}
                </div>
                <div class="flex-1 min-w-0">
                    <h3 class="text-lg font-bold text-gray-900 dark:text-white truncate mb-1">
                        {{ contact.name }}
                    </h3>
                    {% if contact.is_favorite %}
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 dark:bg-yellow-900/30 text-yellow-800 dark:text-yellow-300">
                        <i class="fas fa-star mr-1"></i> Favorite
                    </span>
                    {% else %}
                    <span class="text-xs text-gray-500 dark:text-gray-400">Contact</span>
                    {% endif %}
                </div>
            </div>
            
            <!-- Favorite Toggle -->
            <button class="toggle-favorite p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors {% if contact.is_favorite %}text-yellow-500{% else %}text-gray-400 hover:text-yellow-500{% endif %}" 
                    data-contact-id="{{ contact.pk }}" data-is-favorite="{{ contact.is_favorite|yesno:'true,false' }}" 
                    title="{% if contact.is_favorite %}Remove from favorites{% else %}Add to favorites{% endif %}">
                <i class="{% if contact.is_favorite %}fa-solid{% else %}fa-regular{% endif %} fa-star text-lg"></i>
            </button>
        </div>
        
        <!-- Category Badge -->
        <div class="mt-3">
            <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium 
                {% if contact.category == 'Family' %}bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300
                {% elif contact.category == 'Friends' %}bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-300
                {% elif contact.category == 'Work' %}bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300
                {% else %}bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300{% endif %}">
                <i class="fas fa-tag mr-1.5"></i>{{ contact.category }}
            </span>
        </div>
    </div>
    
    <!-- Card Body -->
    <div class="p-6 pt-4 space-y-3">
        <!-- Phone -->
        <div class="flex items-center space-x-3 group">
            <div class="w-8 h-8 bg-blue-50 dark:bg-blue-900/20 rounded-lg flex items-center justify-center group-hover:bg-blue-100 dark:hover:bg-blue-900/40 transition-colors">
                <i class="fas fa-phone text-blue-600 dark:text-blue-400 text-sm"></i>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-0.5">Phone</p>
                <p class="text-sm font-semibold text-gray-900 dark:text-white truncate">{{ contact.phone }}</p>
            </div>
        </div>
        
        <!-- Email -->
        <div class="flex items-center space-x-3 group">
            <div class="w-8 h-8 bg-purple-50 dark:bg-purple-900/20 rounded-lg flex items-center justify-center group-hover:bg-purple-100 dark:hover:bg-purple-900/40 transition-colors">
                <i class="fas fa-envelope text-purple-600 dark:text-purple-400 text-sm"></i>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-0.5">Email</p>
                <p class="text-sm font-semibold text-gray-900 dark:text-white truncate">{{ contact.email }}</p>
            </div>
        </div>
        
        <!-- Created Date -->
        <div class="flex items-center space-x-3 pt-2 border-t border-gray-100 dark:border-gray-700">
            <div class="w-8 h-8 bg-gray-50 dark:bg-gray-700/50 rounded-lg flex items-center justify-center">
                <i class="fas fa-clock text-gray-400 text-sm"></i>
            </div>
            <div class="flex-1">
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-0.5">Added</p>
                <p class="text-xs font-medium text-gray-700 dark:text-gray-300">{{ contact.created_at|date:"M d, Y" }}</p>
            </div>
        </div>
    </div>
    
    <!-- Card Footer - Action Buttons -->
    <div class="p-4 pt-0">
        <div class="grid grid-cols-4 gap-2">
            <!-- View Button -->
            <a href="{% url 'contact_detail' contact.pk %}" 
               class="flex items-center justify-center px-3 py-2.5 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-xl hover:bg-blue-100 dark:hover:bg-blue-900/40 transition-all group"
               title="View Details">
                <i class="fas fa-eye group-hover:scale-110 transition-transform"></i>
            </a>
            
            <!-- Edit Button -->
            <a href="{% url 'contact_update' contact.pk %}" 
               class="flex items-center justify-center px-3 py-2.5 bg-amber-50 dark:bg-amber-900/20 text-amber-600 dark:text-amber-400 rounded-xl hover:bg-amber-100 dark:hover:bg-amber-900/40 transition-all group"
               title="Edit">
                <i class="fas fa-edit group-hover:scale-110 transition-transform"></i>
            </a>
            
            <!-- Favorite Toggle (Mobile) -->
            <button class="toggle-favorite flex items-center justify-center px-3 py-2.5 {% if contact.is_favorite %}bg-yellow-100 dark:bg-yellow-900/30 text-yellow-600 dark:text-yellow-400{% else %}bg-gray-50 dark:bg-gray-700/50 text-gray-600 dark:text-gray-400 hover:bg-yellow-50 dark:hover:bg-yellow-900/20 hover:text-yellow-600 dark:hover:text-yellow-400{% endif %} rounded-xl transition-all group"
                    data-contact-id="{{ contact.pk }}" data-is-favorite="{{ contact.is_favorite|yesno:'true,false' }}"
                    title="Toggle Favorite">
                <i class="{% if contact.is_favorite %}fa-solid{% else %}fa-regular{% endif %} fa-star group-hover:scale-110 transition-transform"></i>
            </button>
            
            <!-- Delete Button -->
            <a href="{% url 'contact_delete' contact.pk %}" 
               class="flex items-center justify-center px-3 py-2.5 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-xl hover:bg-red-100 dark:hover:bg-red-900/40 transition-all group"
               title="Delete">
                <i class="fas fa-trash group-hover:scale-110 transition-transform"></i>
            </a>
        </div>
    </div>
</div>
